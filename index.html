<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spearz FFA – Dominate the Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Bebas+Neue&family=Exo+2:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --bg2: #080b16;
  --purple: #7c3aed;
  --purple2: #a855f7;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --neon-purple: #b517ff;
  --neon-blue: #4cc9f0;
  --card-bg: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.07);
  --text: #e2e8f0;
  --muted: #64748b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;}
#particles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:64px;
  background:rgba(6,8,16,0.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;
  background:linear-gradient(90deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--neon-purple);}
.nav-links{display:flex;gap:4px;}
.nav-links a{
  color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;
  padding:8px 14px;border-radius:6px;transition:all .2s;position:relative;
}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(124,58,237,0.15);}
.nav-links a.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--purple2);border-radius:2px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn-nav{
  padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;
  font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;
  background:linear-gradient(135deg,#6d28d9,#a855f7);color:#fff;
  box-shadow:0 0 20px rgba(168,85,247,0.4);transition:all .3s;
}
.btn-nav:hover{box-shadow:0 0 30px rgba(168,85,247,0.7);transform:translateY(-1px);}
.hero{
  position:relative;min-height:90vh;display:flex;align-items:center;justify-content:center;
  text-align:center;padding:80px 20px;overflow:hidden;z-index:1;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 50%,rgba(99,40,200,0.25) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 50%,rgba(168,85,247,0.2) 0%,transparent 60%),
    radial-gradient(ellipse 80% 60% at 50% 0%,rgba(6,182,212,0.1) 0%,transparent 60%),
    linear-gradient(180deg,#080b16 0%,#060810 100%);
  z-index:-1;
}
.hero-bg::before{

  background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237c3aed' fill-opacity='0.03'%3
