<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spearz FFA - Home</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;

  /* FIXED BACKGROUND */
  background-image: url('SpearzFFA.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  min-height: 100vh;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: rgba(13, 15, 31, 0.9);
  border-bottom: 1px solid #2a2f55;
  position: sticky;
  top: 0;
  backdrop-filter: blur(6px);
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
  opacity: 0.8;
}

nav a:hover {
  color: #22d3ee;
  opacity: 1;
}

/* LOGO */
.logo {
  position: absolute;
  top: 15px;
  left: 15px;
}

.logo img {
  height: 70px;
  width: auto;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
}

.hero h1 {
  font-size: 70px;
  background: linear-gradient(90deg,#4f46e5,#22d3ee,#ec4899);
  -webkit-background-clip: text;
  color: transparent;
}

.btn {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: linear-gradient(90deg,#4f46e5,#ec4899);
  color: white;
}

/* CARDS */
.section {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  padding: 50px;
}

.card {
  background: rgba(17, 22, 43, 0.85);
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #2a2f55;
}
</style>

</head>

<body>

<!-- LOGO -->
<div class="logo">
  <img src="logo.png" alt="Logo">
</div>

<!-- NAV -->
<nav>
  <div><b>SPEARZ FFA</b></div>
  <div>
    <a href="index.html">Home</a>
    <a href="store.html">Store</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="discord.html">Discord</a>
    <a href="support.html">Support</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>SPEARZ FFA</h1>
  <p>Spearmace PvP • Custom weapons/kits • Custom map</p>
  <button class="btn">Join Server</button>
  <button class="btn" onclick="window.location.href='store.html'">Store</button>
</div>

<!-- SECTION -->
<div class="section">
  <div class="card">⚔ Spearmace FFA</div>
  <div class="card">🏆 Leaderboards</div>
  <div class="card">🎁 Daily Rewards</div>
</div>

</body>
</html>
