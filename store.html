<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minecraft Shop UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f14;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
  font-size: 28px;
  font-weight: bold;
}

/* GRID */
.shop {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD BASE */
.card {
  background: #1a1a22;
  border: 2px solid #2a2a35;
  border-radius: 12px;
  padding: 16px;
  position: relative;
  transition: 0.25s ease;
  cursor: pointer;
}

/* HOVER EFFECT */
.card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* ICON */
.icon {
  font-size: 40px;
}

/* NAME */
.name {
  font-size: 18px;
  margin-top: 10px;
  font-weight: bold;
}

/* PRICE */
.price {
  margin-top: 8px;
  color: #aaa;
}

/* PERKS */
.perks {
  margin-top: 10px;
  font-size: 12px;
  color: #ccc;
}

/* BADGE */
.badge {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  padding: 4px 8px;
  border-radius: 6px;
  background: #333;
}

/* =========================
   RANK GLOWS
   ========================= */

/* LEGENDARY (GOLD GLOW) */
.legendary {
  border-color: #ffd700;
  box-shadow: 0 0 10px #ffd70033;
}
.legendary:hover {
  box-shadow: 0 0 25px #ffd700aa;
}

/* NIXUS (BLUE GLOW) */
.nixus {
  border-color: #3aa0ff;
  box-shadow: 0 0 10px #3aa0ff33;
}
.nixus:hover {
  box-shadow: 0 0 25px #3aa0ffaa;
}

/* VIP (GREEN GLOW) */
.vip {
  border-color: #3cff8f;
  box-shadow: 0 0 10px #3cff8f33;
}
.vip:hover {
  box-shadow: 0 0 25px #3cff8faa;
}

/* BUTTON */
.btn {
  margin-top: 12px;
  display: inline-block;
  padding: 8px 12px;
  background: #2b2b35;
  border: 1px solid #444;
  border-radius: 8px;
  font-size: 12px;
}
.btn:hover {
  background: #3a3a48;
}
</style>
</head>

<body>

<div class="header">🎮 Minecraft Shop</div>

<div class="shop">

  <!-- LEGENDARY -->
  <div class="card legendary">
    <div class="icon">🏆</div>
    <div class="badge">LEGENDARY</div>
    <div class="name">Legendary Rank</div>
    <div class="price">$19.99</div>
    <div class="perks">Rare rewards • Elite status • Boosts</div>
    <div class="btn">Buy Now</div>
  </div>

  <!-- NIXUS -->
  <div class="card nixus">
    <div class="icon">🧿</div>
    <div class="badge">NIXUS</div>
    <div class="name">Nixus Rank</div>
    <div class="price">$14.99</div>
    <div class="perks">Custom perks • Mystic powers • Effects</div>
    <div class="btn">Buy Now</div>
  </div>

  <!-- VIP -->
  <div class="card vip">
    <div class="icon">🎫</div>
    <div class="badge">VIP</div>
    <div class="name">VIP Rank</div>
    <div class="price">$9.99</div>
    <div class="perks">Access perks • Chat prefix • Rewards</div>
    <div class="btn">Buy Now</div>
  </div>

</div>

</body>
</html>
