<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store – Spearz FFA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810; --purple: #7c3aed; --purple2: #a855f7;
  --neon-purple: #b517ff; --neon-blue: #4cc9f0;
  --border: rgba(255,255,255,0.07); --text: #e2e8f0;
  --discord: #5865F2; --discord-hover: #4752c4;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--neon-purple);}
.nav-links{display:flex;gap:4px;}
.nav-links a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:6px;transition:all .2s;position:relative;}
.nav-links a:hover,.nav-links a.active{color:#fff;background:rgba(124,58,237,0.15);}
.nav-links a.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--purple2);border-radius:2px;}
.nav-right{display:flex;align-items:center;gap:10px;}
.cart-btn{position:relative;padding:9px 20px;border-radius:8px;border:1px solid var(--border);cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:700;font-size:13px;background:rgba(255,255,255,0.04);color:#fff;transition:all .2s;}
.cart-btn:hover{border-color:var(--purple2);}
.cart-count{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--purple2);font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;display:none;}
.btn-nav{padding:9px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;background:linear-gradient(135deg,#6d28d9,#a855f7);color:#fff;box-shadow:0 0 20px rgba(168,85,247,0.4);transition:all .3s;}
.page-header{text-align:center;padding:60px 20px 40px;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(124,58,237,0.12) 0%,transparent 70%);}
.page-label{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--purple2);margin-bottom:8px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,6vw,72px);letter-spacing:4px;background:linear-gradient(135deg,#fff,#c4b5fd,var(--neon-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.cats{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 48px 40px;}
.cat-btn{padding:9px 18px;border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;background:rgba(255,255,255,0.04);border:1px solid var(--border);color:#94a3b8;transition:all .2s;}
.cat-btn.active{background:rgba(124,58,237,0.2);border-color:var(--purple2);color:#fff;}
.cat-btn:hover:not(.active){border-color:rgba(168,85,247,0.3);color:#e2e8f0;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;padding:0 48px 80px;max-width:1300px;margin:0 auto;}
.shop-card{background:rgba(255,255,255,0.025);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:all .3s;cursor:pointer;position:relative;}
.shop-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,0.3);box-shadow:0 8px 40px rgba(124,58,237,0.2);}
.badge{position:absolute;top:12px;left:12px;z-index:2;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.badge-popular{background:rgba(236,72,153,0.9);color:#fff;}
.badge-bestseller{background:rgba(251,191,36,0.9);color:#000;}
.badge-new{background:rgba(6,182,212,0.9);color:#000;}
.card-img{height:160px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(168,85,247,0.05));font-size:72px;position:relative;overflow:hidden;}
.card-img::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 80%,rgba(168,85,247,0.2),transparent 60%);}
.card-body{padding:16px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:8px;}
.card-perks{list-style:none;display:flex;flex-direction:column;gap:3px;margin-bottom:12px;}
.card-perks li{font-size:12px;color:#64748b;}
.card-perks li::before{content:'• ';color:var(--purple2);}
.card-price{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;color:#fff;margin-bottom:12px;}
.card-price span{font-family:'Exo 2',sans-serif;font-size:13px;color:#64748b;text-decoration:line-through;margin-left:6px;}
.btn-add{width:100%;padding:11px;border-radius:8px;cursor:pointer;font-family:'Exo 2',sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;background:rgba(124,58,237,0.2);border:1px solid rgba(124,58,237,0.3);color:#c4b5fd;transition:all .3s;}
.btn-add:hover{background:linear-gradient(135deg,#6d28d9,#a855f7);border-color:transparent;color:#fff;box-shadow:0 0 20px rgba(168,85,247,0.4);}
.btn-add.added{background:linear-gradient(135deg,#059669,#10b981);border-color:transparent;color:#fff;}
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-sidebar{position:fixed;right:0;top:0;height:100%;width:380px;background:#0e1120;border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column;}
.cart-sidebar.open{transform:translateX(0);}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);}
.cart-head h2{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;}
.cart-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.05);border:none;color:#94a3b8;cursor:pointer;font-size:18px;}
.cart-close:hover{background:rgba(255,255,255,0.1);color:#fff;}
.cart-items{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
.cart-item{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:12px;}
.cart-item-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(124,58,237,0.1);border-radius:8px;}
.cart-item-info{flex:1;}
.cart-item-name{font-weight:700;font-size:14px;}
.cart-item-price{font-size:13px;color:var(--purple2);font-weight:600;}
.cart-remove{background:none;border:none;color:#64748b;cursor:pointer;font-size:18px;padding:4px;}
.cart-remove:hover{color:#ef4444;}
.cart-empty{text-align:center;color:#475569;padding:40px 0;}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border);}
.cart-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:16px;}
.cart-total-price{color:var(--purple2);}
 
/* ── Discord Ticket Button ── */
.btn-discord-ticket {
  width: 100%;
  padding: 14px 20px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-family: 'Exo 2', sans-serif;
  font-weight: 800;
  font-size: 14px;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: #5865F2;
  color: #fff;
  box-shadow: 0 0 24px rgba(88,101,242,0.55);
  transition: background .2s, box-shadow .2s, transform .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  line-height: 1;
}
.btn-discord-ticket:hover {
  background: #4752c4;
  box-shadow: 0 0 40px rgba(88,101,242,0.85);
  transform: translateY(-2px);
}
.btn-discord-ticket:active {
  transform: translateY(0);
}
.btn-discord-ticket .dc-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  fill: #fff;
}
.cart-ticket-hint {
  font-size: 11px;
  color: #475569;
  text-align: center;
  margin-top: 10px;
  line-height: 1.5;
}
 
footer{background:rgba(0,0,0,0.4);border-top:1px solid var(--border);padding:32px 48px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.footer-text{font-size:12px;color:#475569;line-height:1.6;}
.footer-links{display:flex;gap:20px;}
.footer-links a{font-size:12px;color:#475569;text-decoration:none;}
.footer-links a:hover{color:#a78bfa;}
</style>
</head>
<body>
 
<nav>
  <div class="logo"><span class="logo-main">SPEARZ</span><span class="logo-sub">FFA</span></div>
  <div class="nav-links">
    <a href="index.html">🏠 Home</a>
    <a href="store.html" class="active">🛒 Store</a>
    <a href="leaderboard.html">🏆 Leaderboards</a>
    <a href="discord.html">💬 Discord</a>
    <a href="support.html">🛠 Support</a>
  </div>
  <div class="nav-right">
    <button class="cart-btn" onclick="toggleCart()">🛒 Cart<span class="cart-count" id="cartCount">0</span></button>
    <a href="https://discord.gg/8npD7szeF" target="_blank" class="btn-nav">Join Server</a>
  </div>
</nav>
 
<div class="page-header">
  <div class="page-label">Spearz FFA Store</div>
  <div class="page-title">Featured Items</div>
</div>
 
<div class="cats">
  <button class="cat-btn active" onclick="filterCat('all',this)">⭐ Featured</button>
  <button class="cat-btn" onclick="filterCat('ranks',this)">🎖️ Ranks</button>
  <button class="cat-btn" onclick="filterCat('kits',this)">⚔️ Kits</button>
  <button class="cat-btn" onclick="filterCat('crates',this)">📦 Crates</button>
  <button class="cat-btn" onclick="filterCat('keys',this)">🔑 Keys</button>
  <button class="cat-btn" onclick="filterCat('cosmetics',this)">✨ Cosmetics</button>
  <button class="cat-btn" onclick="filterCat('tags',this)">🏷️ Tags</button>
</div>
 
<div class="shop-grid" id="shopGrid"></div>
 
<div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-head">
    <h2>Your Cart</h2>
    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">🛒 Your cart is empty</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span class="cart-total-price" id="cartTotal">€0.00</span>
    </div>
 
    <!-- Discord Ticket Button -->
    <button class="btn-discord-ticket" onclick="openTicket()">
      <svg class="dc-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"/>
      </svg>
      Open een Ticket
    </button>
    <div class="cart-ticket-hint">Je wordt doorgestuurd naar het Discord ticket kanaal.</div>
  </div>
</div>
 
<footer>
  <div class="logo"><span class="logo-main">SPEARZ</span><span class="logo-sub">FFA</span></div>
  <div class="footer-text">© 2024 Spearz FFA. All rights reserved.</div>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="support.html">Support</a>
    <a href="https://discord.gg/8npD7szeF" target="_blank">Discord</a>
  </div>
</footer>
 
<script>
const TICKET_URL = 'https://discord.com/channels/1256165222675120220/1509904037695197316';
 
const products = [
  {id:1,name:'Nixus ',cat:'ranks',badge:'popular',icon:'🧿',price:49,99,old:29.99,perks:['All perks and kits','Exclusive cosmetics','Priority in queues']},
  {id:2,name:'',cat:'crates',badge:'bestseller',icon:'🧿',price:,old:null,perks:['Random rewards','High tier items','Exclusive drops']},
  {id:3,name:'Legendary',cat:'keys',badge:null,icon:'🏆',price:39,99,old:null,perks:['Used to open crates','Earn rare rewards','Stackable']},
  {id:4,name:'',cat:'kits',badge:null,icon:'🏆',price:,old:null,perks:['Balanced and strong','Perfect for starters','Easy to master']},
  {id:5,name:'Pulse',cat:'tags',badge:null,icon:'🪶',price:29,99,old:null,perks:['Custom in-game tag','Stand out in chat','Multiple colors']},
  {id:6,name:'',cat:'ranks',badge:null,icon:'🪶',price:,old:null,perks:['Extra kits','Chat prefix','VIP lounge access']},
  {id:7,name:'Air Rank',cat:'ranks',badge:'new',icon:'⛨',price:19.99,old:null,perks:['All VIP perks','Custom kill effects','MVP prefix']},
  {id:8,name:'',cat:'kits',badge:'new',icon:'⛨',price:,old:null,perks:['Stealth abilities','Fast movement','Smoke bombs']},
  {id:9,name:'Vip+ Rank',cat:'crates',badge:null,icon:'🎫',price:12.99,old:null,perks:['Legendary items','Dragon cosmetics','Rare tags']},
  {id:10,name:'Vip Rank',cat:'tags',badge:null,icon:'🎫',price:7,99,old:null,perks:['Glowing username','7 color options','Stackable with others']},
  {id:11,name:'',cat:'kits',badge:null,icon:'⚔️',price:,old:null,perks:['PvP optimized','Special combo bonus','Unique animations']},
  {id:12,name:'Spearz Rank',cat:'keys',badge:null,icon:'❄️💠',price:4,99,old:null,perks:['Opens any crate','Higher reward chance','Exclusive to masters']},
];
 
let cart = [];
 
function renderShop(cat) {
  const grid = document.getElementById('shopGrid');
  const filtered = cat === 'all' ? products : products.filter(p => p.cat === cat);
  grid.innerHTML = filtered.map(p => `
    <div class="shop-card" data-cat="${p.cat}">
      ${p.badge ? `<div class="badge badge-${p.badge}">${p.badge}</div>` : ''}
      <div class="card-img">${p.icon}</div>
      <div class="card-body">
        <div class="card-name">${p.name}</div>
        <ul class="card-perks">${p.perks.map(k => `<li>${k}</li>`).join('')}</ul>
        <div class="card-price">€${p.price.toFixed(2)}${p.old ? `<span>€${p.old.toFixed(2)}</span>` : ''}</div>
        <button class="btn-add" id="btn-${p.id}" onclick="addToCart(${p.id})">View Item</button>
      </div>
    </div>
  `).join('');
}
 
function filterCat(cat, el) {
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderShop(cat);
}
 
function addToCart(id) {
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) { existing.qty = (existing.qty || 1) + 1; } else { cart.push({...p, qty: 1}); }
  updateCart();
  const btn = document.getElementById('btn-' + id);
  if (btn) { btn.classList.add('added'); btn.textContent = '✅ Added!'; setTimeout(() => { btn.classList.remove('added'); btn.textContent = 'View Item'; }, 1500); }
  openCart();
}
 
function removeFromCart(id) { cart = cart.filter(x => x.id !== id); updateCart(); }
 
function updateCart() {
  const count = cart.reduce((s, i) => s + (i.qty || 1), 0);
  const total = cart.reduce((s, i) => s + i.price * (i.qty || 1), 0);
  const cc = document.getElementById('cartCount');
  cc.style.display = count > 0 ? 'flex' : 'none';
  cc.textContent = count;
  document.getElementById('cartTotal').textContent = '€' + total.toFixed(2);
  const itemsEl = document.getElementById('cartItems');
  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">🛒 Your cart is empty</div>';
  } else {
    itemsEl.innerHTML = cart.map(i => `
      <div class="cart-item">
        <div class="cart-item-icon">${i.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${i.name}${i.qty > 1 ? ' ×' + i.qty : ''}</div>
          <div class="cart-item-price">€${(i.price * (i.qty || 1)).toFixed(2)}</div>
        </div>
        <button class="cart-remove" onclick="removeFromCart(${i.id})">✕</button>
      </div>`).join('');
  }
}
 
function openCart() {
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartSidebar').classList.add('open');
}
 
function toggleCart() {
  document.getElementById('cartOverlay').classList.toggle('open');
  document.getElementById('cartSidebar').classList.toggle('open');
}
 
function openTicket() {
  if (cart.length === 0) {
    alert('Voeg eerst een item toe aan je winkelwagen!');
    return;
  }
  window.open(TICKET_URL, '_blank');
}
 
renderShop('all');
</script>
</body>
</html>
