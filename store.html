<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store – Spearz FFA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #060810; --purple: #7c3aed; --purple2: #a855f7;
  --neon-purple: #b517ff; --neon-blue: #4cc9f0;
  --border: rgba(255,255,255,0.07); --text: #e2e8f0;
  --discord: #5865F2; --discord-hover: #4752c4;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;overflow-x:hidden;}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:64px;background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{display:flex;flex-direction:column;line-height:1;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;background:linear-gradient(90deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:4px;color:var(--neon-purple);}

/* CARDS GRID */
.shop-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:0 48px 80px;
  max-width:1300px;
  margin:0 auto;
}

/* SHOP CARD */
.shop-card{
  background:rgba(255,255,255,0.025);
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:all .25s ease;
  cursor:pointer;
  position:relative;
}

/* 🔥 HOVER EFFECT (belangrijkste fix) */
.shop-card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:rgba(168,85,247,0.45);
  box-shadow:0 12px 45px rgba(124,58,237,0.25);
}

/* EXTRA: afbeelding reageert ook */
.card-img{
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(168,85,247,0.05));
  font-size:72px;
  position:relative;
  overflow:hidden;
  transition:transform .3s ease;
}

.shop-card:hover .card-img{
  transform:scale(1.05);
}

/* TEXT + BUTTON (unchanged but smooth) */
.card-body{padding:16px;}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:#fff;margin-bottom:8px;}

.btn-add{
  width:100%;
  padding:11px;
  border-radius:8px;
  cursor:pointer;
  font-family:'Exo 2',sans-serif;
  font-weight:800;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  background:rgba(124,58,237,0.2);
  border:1px solid rgba(124,58,237,0.3);
  color:#c4b5fd;
  transition:all .3s ease;
}

/* BUTTON HOVER blijft + iets strakker */
.btn-add:hover{
  background:linear-gradient(135deg,#6d28d9,#a855f7);
  border-color:transparent;
  color:#fff;
  box-shadow:0 0 25px rgba(168,85,247,0.5);
  transform:translateY(-2px);
}

/* rest van jouw CSS blijft exact hetzelfde */
</style>
</head>

<body>

<!-- JE HTML + JS BLIJFT ONGEWIJZIGD -->

</body>
</html>
